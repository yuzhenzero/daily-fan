name: Update Episodes

on:
  schedule:
    - cron: '30 11 * * 6'   # 每周六 UTC 11:30 (北京时间 19:30)
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Fetch Bilibili API
        run: |
          curl -s "https://api.bilibili.com/pgc/view/web/season?season_id=28747" -o season_data.json

      - name: Extract & deduplicate episodes
        run: |
          python -c "
          import json
          with open('season_data.json','r',encoding='utf-8') as f:
              d=json.load(f)
          eps=d['result']['episodes']
          # Group by title, pick the one with longest duration.
          # Previews are ~30s, full episodes ~1000s+.
          groups={}
          for ep in eps:
              t=ep['title']
              if t not in groups:
                  groups[t]=[]
              groups[t].append(ep)
          cleaned=[]
          for t in sorted(groups.keys(),key=int):
              # Sort by (duration, ep_id) ascending; last = longest duration (or largest ep_id if tie)
              best=sorted(groups[t],key=lambda e:(e.get('duration',0),e['id']))[-1]
              cleaned.append({
                  'ep_id':best['id'],
                  'title':best['title'],
                  'long_title':best.get('long_title',''),
                  'cover':best['cover'].replace('http://','https://'),
                  'url':'https://www.bilibili.com/bangumi/play/ep'+str(best['id'])
              })
          with open('episodes.json','w',encoding='utf-8') as f:
              json.dump(cleaned,f,ensure_ascii=False,indent=2)
          print(f'{len(eps)} raw -> {len(cleaned)} unique')
          "

      - name: Regenerate HTML
        run: python generate_html.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html episodes.json episodes.js .nojekyll
          if git diff --cached --quiet; then
            echo "No changes, skipping commit"
          else
            git commit -m "chore: 自动更新剧集数据 ($(date +%Y-%m-%d))"
            git push
          fi
