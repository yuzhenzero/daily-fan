name: Update Episodes

on:
  schedule:
    - cron: '30 11 * * 6'   # 每周六 UTC 11:30 (北京时间 19:30)
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Fetch Bilibili API
        run: |
          curl -s "https://api.bilibili.com/pgc/view/web/season?season_id=28747" -o season_data.json

      - name: Extract & deduplicate episodes
        run: |
          python -c "
          import json
          with open('season_data.json','r',encoding='utf-8') as f:
              d=json.load(f)
          eps=d['result']['episodes']
          items={}
          for ep in eps:
              t=ep['title']
              dur=ep.get('duration',0)
              # Prefer full episodes (duration>0) over previews (duration=0).
              # If both have duration>0, prefer the larger ep_id (newer version).
              if t not in items:
                  items[t]={
                      'ep_id':ep['id'],
                      'title':ep['title'],
                      'long_title':ep.get('long_title',''),
                      'cover':ep['cover'].replace('http://','https://'),
                      'url':'https://www.bilibili.com/bangumi/play/ep'+str(ep['id']),
                      '_dur':dur
                  }
              else:
                  prev_dur=items[t].get('_dur',0)
                  # Replace if: current is preview AND new is full episode
                  # OR both are full AND new has larger ep_id
                  if (prev_dur==0 and dur>0) or (prev_dur>0 and dur>0 and ep['id']>items[t]['ep_id']):
                      items[t]={
                          'ep_id':ep['id'],
                          'title':ep['title'],
                          'long_title':ep.get('long_title',''),
                          'cover':ep['cover'].replace('http://','https://'),
                          'url':'https://www.bilibili.com/bangumi/play/ep'+str(ep['id']),
                          '_dur':dur
                      }
          # Remove internal _dur field before saving
          for v in items.values():
              v.pop('_dur',None)
          cleaned=sorted(items.values(),key=lambda e:int(e['title']))
          with open('episodes.json','w',encoding='utf-8') as f:
              json.dump(cleaned,f,ensure_ascii=False,indent=2)
          print(f'{len(eps)} raw -> {len(cleaned)} unique')
          "

      - name: Regenerate HTML
        run: python generate_html.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html episodes.json episodes.js
          if git diff --cached --quiet; then
            echo "No changes, skipping commit"
          else
            git commit -m "chore: 自动更新剧集数据 ($(date +%Y-%m-%d))"
            git push
          fi
